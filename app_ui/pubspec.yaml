name: xray_desktop_ui
description: Troodi VPN desktop UI for Xray-based routing.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  flutter_animate: ^4.5.2
  file_selector: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: lib/images/logo.png
  windows:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - lib/images/logo.png
